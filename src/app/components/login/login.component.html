<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span>📚</span>
      <div>
        <div class="brand-title">StudyHub</div>
        <div class="brand-sub">MCA A25 Batch</div>
      </div>
    </div>

    <h3>Admin Login</h3>
    <p class="login-subtitle">Sign in to manage study materials</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="email" placeholder=""
             (keyup.enter)="login()" class="form-input" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-input-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder=""
               (keyup.enter)="login()" class="form-input" />
        <span class="password-toggle" (click)="togglePassword()">
          <span *ngIf="!showPassword">👁</span>
          <span *ngIf="showPassword">👁‍🗨</span>
        </span>
      </div>
    </div>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <button class="btn-login" (click)="login()" [disabled]="loading">
      <span *ngIf="!loading">Sign In →</span>
      <span *ngIf="loading">Signing in...</span>
    </button>

    <a routerLink="/semesters" class="guest-link">← Back to Study Materials</a>
  </div>
</div>
